<button class="theme-toggle"
        type="button"
        data-theme-toggle
        aria-label="toggle between light and dark theme"
        aria-pressed="false">
  <span class="theme-toggle__label">theme:</span>
  <span class="theme-toggle__state" data-state="light">light</span>
  <span class="theme-toggle__sep">/</span>
  <span class="theme-toggle__state" data-state="dark">dark</span>
</button>
