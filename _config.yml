title: inferi
tagline: a collective writing desk for cs & security notes
description: a collective of researchers writing about computer science and information security
url: https://inferi.club
lang: en
permalink: /blog/:slug/
future: true

collections:
  snippets:
    output: true
    permalink: /snippets/:slug/

defaults:
  - scope:
      path: ""
      type: snippets
    values:
      layout: snippet

author:
  name: the inferi collective
  url: https://github.com/inferigang

social:
  github: https://github.com/inferigang
  twitter: https://twitter.com/inferigang
  discord: https://discord.gg/REPLACE-ME   # replace before deploy
  rss: /feed.xml

markdown: kramdown
highlighter: rouge
kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

include:
  - CNAME

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor
  - docs
  - .jekyll-cache
